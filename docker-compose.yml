version: "3.9"

services:
  backend:
    build: ./backend
    platform: linux/arm64
    container_name: vermogen-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/vermogen.db}

  frontend:
    build: ./frontend
    platform: linux/arm64
    container_name: vermogen-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
